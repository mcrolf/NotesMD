# NotesMD desktop installer downloads (Apache 2.4)
#
# Serves HTTPS static files from /var/www/downloads/notesmd/
# URL prefix: https://<DOWNLOADS_DOMAIN>/downloads/notesmd/
#
# Before enabling:
#   1. Replace DOWNLOADS_DOMAIN with your hostname.
#   2. Run server/downloads/scripts/init-download-directory.sh on the host.
#   3. Enable required modules: ssl, headers, rewrite
#   4. Obtain TLS certs (certbot --apache -d DOWNLOADS_DOMAIN).
#
# Install:
#   sudo cp notesmd-downloads.conf /etc/apache2/sites-available/notesmd-downloads.conf
#   sudo a2ensite notesmd-downloads
#   sudo a2enmod ssl headers rewrite
#   sudo apachectl configtest && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName DOWNLOADS_DOMAIN

    DocumentRoot /var/www

    <Directory /var/www/.well-known/acme-challenge>
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName DOWNLOADS_DOMAIN

    DocumentRoot /var/www

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/DOWNLOADS_DOMAIN/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/DOWNLOADS_DOMAIN/privkey.pem
    Include                 /etc/letsencrypt/options-ssl-apache.conf

    # Correct Content-Type for desktop installers and manifest files
    AddType application/json                         .json
    AddType text/plain                               .txt
    AddType application/x-apple-diskimage            .dmg
    AddType application/vnd.microsoft.portable-executable .exe
    AddType application/x-executable                 .AppImage

    <Directory /var/www/downloads/notesmd>
        Options -Indexes +FollowSymLinks
        Require all granted

        # latest.json may be fetched from another origin (website, GitHub Pages)
        <Files "latest.json">
            Header set Cache-Control "public, max-age=300, must-revalidate"
            Header set Access-Control-Allow-Origin "*"
        </Files>

        # Installers download as attachments
        <FilesMatch "\.(dmg|exe|AppImage)$">
            Header set Content-Disposition "attachment"
        </FilesMatch>

        Header always set X-Content-Type-Options "nosniff"
    </Directory>
</VirtualHost>
