# NotesMD desktop installer downloads (nginx)
#
# Serves HTTPS static files from /var/www/downloads/notesmd/
# URL prefix: https://<DOWNLOADS_DOMAIN>/downloads/notesmd/
#
# Before enabling:
#   1. Replace DOWNLOADS_DOMAIN with your hostname (e.g. notesmd.example.com).
#   2. Run server/downloads/scripts/init-download-directory.sh on the host.
#   3. Obtain TLS certs (certbot --nginx -d DOWNLOADS_DOMAIN) or update ssl_* paths.
#   4. Include mime.types.snippet in http { } OR rely on the types block below.
#
# Install (Debian/Ubuntu):
#   sudo cp notesmd-downloads.conf /etc/nginx/sites-available/notesmd-downloads
#   sudo ln -s /etc/nginx/sites-available/notesmd-downloads /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS redirect; keep ACME webroot for certificate renewal
server {
    listen 80;
    listen [::]:80;
    server_name DOWNLOADS_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name DOWNLOADS_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/DOWNLOADS_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOWNLOADS_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www;

    # Installer and manifest MIME types (also available as mime.types.snippet for http { })
    types {
        application/json                         json;
        text/plain                               txt;
        application/x-apple-diskimage            dmg;
        application/vnd.microsoft.portable-executable exe;
        application/x-executable                 AppImage;
    }

    # Release manifest — fetched by website and README consumers
    location = /downloads/notesmd/latest.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files /downloads/notesmd/latest.json =404;
    }

    # Versioned release directory (binaries + SHA256SUMS.txt)
    location /downloads/notesmd/ {
        autoindex off;
        add_header X-Content-Type-Options "nosniff" always;

        # Serve only files that exist under the release tree
        try_files $uri =404;
    }

    # Desktop installers: correct type + attachment disposition
    location ~ ^/downloads/notesmd/v[^/]+/NotesMD-[^/]+\.(dmg|exe|AppImage)$ {
        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Checksum file alongside each release
    location ~ ^/downloads/notesmd/v[^/]+/SHA256SUMS\.txt$ {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
}
