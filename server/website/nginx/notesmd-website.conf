# NotesMD marketing site (nginx) — static download page
#
# Serves /download/ from /var/www/notesmd/download/
# Installers and latest.json are configured in server/downloads/nginx/notesmd-downloads.conf
#
# Before enabling:
#   1. Replace SITE_DOMAIN with your hostname (e.g. notesmd.example.com).
#   2. Copy server/website/download/ to /var/www/notesmd/download/
#   3. Obtain TLS certs (certbot --nginx -d SITE_DOMAIN)
#
# Install (Debian/Ubuntu):
#   sudo cp notesmd-website.conf /etc/nginx/sites-available/notesmd-website
#   sudo ln -s /etc/nginx/sites-available/notesmd-website /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name SITE_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name SITE_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/SITE_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SITE_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/notesmd;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Download page — fetches /downloads/notesmd/latest.json from the same host
    location /download/ {
        alias /var/www/notesmd/download/;
        try_files $uri $uri/ /download/index.html;
    }

    location = /download {
        return 301 /download/;
    }

    # Optional marketing home (add index.html at /var/www/notesmd/ when ready)
    location / {
        try_files $uri $uri/ =404;
    }
}
