spring:
  datasource:
    url: jdbc:h2:mem:notes;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: test-jwt-secret-must-be-at-least-32-bytes!
    issuer: notes-api
    access-token-ttl: PT1H

