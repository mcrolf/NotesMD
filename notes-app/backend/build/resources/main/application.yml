spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notes}
    username: ${SPRING_DATASOURCE_USERNAME:notes}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
  flyway:
    # Adopt databases that already have tables (e.g. legacy Hibernate) but no flyway_schema_history.
    # Baselines at 1 by default, then applies V2+ (users, note owner_id). Prefer a fresh DB or repair if you get duplicate-object errors.
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

app:
  jwt:
    # HS256: set JWT_SECRET in the environment for non-local use (see notes-app/.env.example). Default is for local boot only.
    secret: ${JWT_SECRET:local-dev-only-jwt-signing-key-not-for-production-use}
    issuer: ${JWT_ISSUER:notesmd-api}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT1H}

  cors:
    # MN 260508 Comma-separated Origin values for /api/** (override with CORS_ALLOWED_ORIGINS). The literal
    # entry `null` allows packaged Electron (file://) and similar clients that send `Origin: null` on cross-origin fetch.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,null}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8080}
